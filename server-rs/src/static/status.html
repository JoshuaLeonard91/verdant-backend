<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verdant — System Status</title>
  <meta name="description" content="Real-time system status for Verdant.">
  <meta name="theme-color" content="#060806">
  <link rel="icon" href="/assets/neon-tree-small.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #060806;
      --text: #f0f2f0;
      --text-mid: #94a39a;
      --text-dim: #475550;
      --green: #10b981;
      --green-soft: rgba(16, 185, 129, 0.10);
      --red: #ef4444;
      --red-soft: rgba(239, 68, 68, 0.10);
      --rule: rgba(255, 255, 255, 0.07);
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* ─── Nav ─── */

    nav {
      padding: 2rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--green);
      text-decoration: none;
    }

    nav a:not(.logo) {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    nav a:not(.logo):hover { color: var(--text-mid); }

    /* ─── Content ─── */

    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 4rem 0;
    }

    /* ─── Status dot ─── */

    .status-mark {
      width: 72px;
      height: 72px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2.5rem;
      position: relative;
      border: 1px solid var(--rule);
      background: rgba(255, 255, 255, 0.03);
    }

    .status-mark img {
      width: 38px;
      height: 38px;
    }

    .status-mark.operational {
      background: var(--green-soft);
      border-color: rgba(16, 185, 129, 0.34);
    }
    .status-mark.operational::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1.5px solid var(--green);
      opacity: 0;
      animation: ping 2.5s ease-out infinite;
    }

    .status-mark.down {
      background: var(--red-soft);
      border-color: rgba(239, 68, 68, 0.38);
    }

    .status-mark.checking {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--rule);
    }

    @keyframes ping {
      0% { opacity: 0.4; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.8); }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .status-label {
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 3rem;
    }
    .status-label.operational { color: var(--green); }
    .status-label.down { color: var(--red); }
    .status-label.checking { color: var(--text-dim); }

    .meta {
      display: flex;
      align-items: center;
      gap: 2.5rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .meta-value {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-mid);
      margin-left: 0.35rem;
    }

    /* ─── Footer ─── */

    hr {
      border: none;
      height: 1px;
      background: var(--rule);
      max-width: 560px;
      margin: 0 auto;
      width: calc(100% - 4rem);
    }

    footer {
      max-width: 560px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer p {
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    footer a {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    footer a:hover { color: var(--text-mid); }

    @media (max-width: 640px) {
      .meta { flex-direction: column; gap: 0.75rem; }
      footer { flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
  <link rel="stylesheet" href="/assets/site.css">
</head>
<body class="status-page">

<div class="page">

  <nav>
    <a href="/" class="logo">
      <img class="brand-icon" src="/assets/neon-tree-small.svg" alt="" aria-hidden="true">
      <span>Verdant</span>
    </a>
    <a href="/">Home</a>
  </nav>

  <div class="content">
    <div class="status-mark checking" id="status-orb">
      <img src="/assets/neon-tree-small.svg" alt="" aria-hidden="true">
    </div>

    <h1>System Status</h1>
    <p class="status-label checking" id="status-label">Checking...</p>

    <div class="meta">
      <div>Response time <span class="meta-value" id="latency-val">--</span></div>
      <div>Last checked <span class="meta-value" id="last-checked">--</span></div>
    </div>
  </div>

</div>

<hr>

<footer>
  <p>&copy; 2026 Verdant</p>
  <a href="/">Home</a>
</footer>

<script>
  async function checkStatus() {
    const start = performance.now();
    try {
      const res = await fetch('/health');
      const latency = Math.round(performance.now() - start);
      await res.json();

      setStatus('operational', 'All Systems Operational');
      document.getElementById('latency-val').textContent = latency + 'ms';
    } catch (e) {
      setStatus('down', 'Service Disruption');
      document.getElementById('latency-val').textContent = '--';
    }

    document.getElementById('last-checked').textContent =
      new Date().toLocaleTimeString();
  }

  function setStatus(status, label) {
    const orb = document.getElementById('status-orb');
    const labelEl = document.getElementById('status-label');
    orb.className = 'status-mark ' + status;
    labelEl.className = 'status-label ' + status;
    labelEl.textContent = label;
  }

  checkStatus();
  setInterval(checkStatus, 30000);
</script>

</body>
</html>
